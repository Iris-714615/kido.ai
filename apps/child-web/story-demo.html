<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>KidoAI 多智能体 · 绘本共创联调 Demo</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 960px; margin: 0 auto; padding: 24px; background: #f7f9fc; color: #222; }
  h1 { color: #4a3aff; border-bottom: 2px solid #e8ecf3; padding-bottom: 8px; }
  h2 { margin-top: 28px; color: #2d3748; }
  .card { background: #fff; border-radius: 10px; padding: 18px; margin: 12px 0; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  label { display: block; margin: 8px 0 4px; font-weight: 600; color: #4a5568; }
  input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; }
  button { background: #4a3aff; color: #fff; border: 0; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-right: 8px; }
  button:disabled { background: #a0aec0; cursor: not-allowed; }
  button.secondary { background: #38a169; }
  button.danger { background: #e53e3e; }
  .stage-list { font-family: ui-monospace, monospace; font-size: 13px; background: #1a202c; color: #68d391; padding: 12px; border-radius: 6px; min-height: 80px; }
  .stage-list div { margin: 2px 0; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge.PASS { background: #c6f6d5; color: #22543d; }
  .badge.REVIEW { background: #fefcbf; color: #744210; }
  .badge.BLOCK { background: #fed7d7; color: #742a2a; }
  pre { background: #2d3748; color: #e2e8f0; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  .score { font-size: 28px; font-weight: 700; color: #4a3aff; }
</style>
</head>
<body>
<h1>🎭 KidoAI 多智能体 · 绘本共创 × 安全审核闭环</h1>
<p>独立联调 Demo（不依赖 Vue，原生 JS 调用后端 <code>/api/v1/stories/*</code> 接口）</p>

<div class="card">
  <h2>1️⃣ 创建故事（触发多智能体流水线）</h2>
  <div class="row">
    <div>
      <label>故事开头</label>
      <textarea id="prompt" rows="2">从前有只小狐狸，它想找到自己的家</textarea>
    </div>
    <div>
      <label>目标年龄</label>
      <select id="age"><option value="3-6">3-6 岁</option><option value="6-10" selected>6-10 岁</option></select>
      <label>主题偏好</label>
      <input id="theme" value="adventure" />
    </div>
  </div>
  <p style="margin-top:12px">
    <button onclick="loginAndCreate()">🔐 登录 demo 并创建故事</button>
  </p>
  <div id="storyId" style="color:#4a5568; font-size:13px"></div>
</div>

<div class="card">
  <h2>2️⃣ 流水线实时进度</h2>
  <div class="stage-list" id="progress">等待启动...</div>
  <p id="status" style="font-size:13px;color:#718096"></p>
</div>

<div class="card" id="reviewPanel" style="display:none">
  <h2>3️⃣ 人工审核（HITL）</h2>
  <p>故事进入 <b>REVIEW</b> 队列，请决策：</p>
  <input id="reviewComment" placeholder="修改建议（revise 时必填）" style="margin-bottom:10px" />
  <button class="secondary" onclick="submitReview('approve')">✅ 批准发布</button>
  <button onclick="submitReview('revise')">✏️ 修订</button>
  <button class="danger" onclick="submitReview('reject')">❌ 拒绝</button>
</div>

<div class="card">
  <h2>4️⃣ 最终绘本结果</h2>
  <div class="row">
    <div><label>标题</label><div id="title">-</div></div>
    <div><label>安全得分</label><div class="score" id="score">-</div></div>
    <div><label>风险等级</label><div id="risk">-</div></div>
  </div>
  <label style="margin-top:14px">故事正文</label>
  <pre id="storyText">（尚未生成）</pre>
  <label>配图 Prompt（JSON）</label>
  <pre id="imagePrompts">（尚未生成）</pre>
  <label>安全审核报告</label>
  <pre id="safetyReport">（尚未生成）</pre>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000/api/v1";
let token = null;
let currentStoryId = null;
let pollTimer = null;

async function login() {
  const r = await fetch(`${API_BASE}/auth/demo`);
  const data = await r.json();
  token = data.access_token;
  return token;
}

function logProgress(msg) {
  const el = document.getElementById("progress");
  const t = new Date().toLocaleTimeString();
  el.innerHTML += `<div>[${t}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function loginAndCreate() {
  document.getElementById("progress").innerHTML = "";
  logProgress("正在登录 demo 账号...");
  await login();
  logProgress("✅ 登录成功，开始创建故事");
  const body = {
    child_id: "1",
    story_prompt: document.getElementById("prompt").value,
    target_age: document.getElementById("age").value,
    preferred_theme: document.getElementById("theme").value,
  };
  const r = await fetch(`${API_BASE}/stories/create`, {
    method: "POST",
    headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
    body: JSON.stringify(body),
  });
  const data = await r.json();
  currentStoryId = data.story_id;
  document.getElementById("storyId").textContent = `story_id: ${currentStoryId} | ${data.message}`;
  logProgress(`🚀 故事已创建: ${currentStoryId}`);
  startPolling();
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollStatus, 3000);
  pollStatus();
}

async function pollStatus() {
  if (!currentStoryId) return;
  try {
    const r = await fetch(`${API_BASE}/stories/${currentStoryId}/status`, {
      headers: { Authorization: `Bearer ${token}` },
    });
    const data = await r.json();
    const score = data.safety_score ?? "-";
    const risk = data.risk_level ?? "-";
    document.getElementById("status").textContent =
      `stage=${data.stage}  score=${score}  risk=${risk}  rev=${data.revision_count}  pending=${data.pending_review}`;
    if (data.stage && data.stage !== "init") {
      logProgress(`stage=${data.stage} score=${score} risk=${risk}`);
    }
    if (data.pending_review) {
      logProgress("⏸️ 进入人工审核队列（HITL 暂停）");
      document.getElementById("reviewPanel").style.display = "block";
      clearInterval(pollTimer);
      pollTimer = null;
    }
    if (["published", "rejected", "failed"].includes(data.stage)) {
      logProgress(`🏁 流水线结束: ${data.stage}`);
      clearInterval(pollTimer);
      pollTimer = null;
      fetchResult();
    }
  } catch (e) {
    document.getElementById("status").textContent = "查询失败: " + e.message;
  }
}

async function submitReview(action) {
  if (!currentStoryId) return;
  const comment = document.getElementById("reviewComment").value;
  const r = await fetch(`${API_BASE}/stories/${currentStoryId}/review`, {
    method: "POST",
    headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
    body: JSON.stringify({ action, comment }),
  });
  const data = await r.json();
  logProgress(`📝 审核决策已提交: ${action} → ${data.message}`);
  document.getElementById("reviewPanel").style.display = "none";
  startPolling();
}

async function fetchResult() {
  const r = await fetch(`${API_BASE}/stories/${currentStoryId}/result`, {
    headers: { Authorization: `Bearer ${token}` },
  });
  const data = await r.json();
  const meta = data.metadata || {};
  document.getElementById("title").textContent = meta.title || "-";
  document.getElementById("score").textContent = meta.safety_score ?? "-";
  const risk = meta.risk_level || "-";
  document.getElementById("risk").innerHTML = `<span class="badge ${risk}">${risk}</span>`;
  document.getElementById("storyText").textContent = data.story_text || "（无）";
  document.getElementById("imagePrompts").textContent = JSON.stringify(data.image_prompts, null, 2);
  document.getElementById("safetyReport").textContent = JSON.stringify(data.safety_report, null, 2);
}
</script>
</body>
</html>
